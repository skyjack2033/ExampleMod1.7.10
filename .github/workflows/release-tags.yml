name: Release tagged build

on:
  push:
    tags: [ '*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew build --no-daemon

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Nova Engineering - ECO AE Extension ${{ github.ref_name }}"
          body: |
            ## Nova Engineering - ECO AE Extension ${{ github.ref_name }}

            应用能源2 (AE2) 附属模组 - GTNH 1.7.10

            ### 功能
            - ECalculator - AE2 合成 CPU 外部化
            - EFabricator - 高级自动合成多方块
            - EStorage - 扩展存储系统

            ### 安装
            下载 `ecoaeextension-${{ github.ref_name }}.jar` 放入 `mods/` 目录

            ### 依赖
            - Applied Energistics 2 (rv3-beta-690-GTNH+)
            - GT New Horizons 2.8.0+
          files: |
            build/libs/*.jar
          prerelease: false
          generateReleaseNotes: false
